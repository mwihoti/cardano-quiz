services:
  - type: web
    name: cardano-quiz-nbo
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PIN
        sync: false          # set manually in Render dashboard
      - key: VITE_AIRTABLE_API_KEY
        sync: false
      - key: VITE_AIRTABLE_BASE_ID
        sync: false
